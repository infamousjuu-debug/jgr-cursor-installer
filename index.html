<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JGR Cursor Installer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --glass-bg: rgba(255, 255, 255, 0.07);
      --glass-border: rgba(255, 255, 255, 0.15);
      --accent: #ffffff;
      --github-bg: rgba(255, 255, 255, 0.03);
    }

    body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI Variable", "Segoe UI", Arial, sans-serif;
      background: #0a0a0a;
      /* Dynamic mesh background */
      background-image: 
        radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
        radial-gradient(at 50% 0%, hsla(225,39%,25%,1) 0, transparent 50%), 
        radial-gradient(at 100% 0%, hsla(339,49%,20%,1) 0, transparent 50%);
      min-height: 100vh;
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
    }

    .container {
      text-align: center;
      z-index: 1;
      padding: 40px 20px;
      width: 100%;
      max-width: 500px;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 3.5rem);
      margin-bottom: 5px;
      font-weight: 700;
      letter-spacing: -1px;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.6);
      font-size: 1.1rem;
      margin-bottom: 30px;
    }

    /* Main Download Card */
    .glass {
      padding: 40px;
      background: var(--glass-bg);
      backdrop-filter: blur(25px) saturate(180%);
      -webkit-backdrop-filter: blur(25px) saturate(180%);
      border-radius: 24px;
      border: 1px solid var(--glass-border);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      margin-bottom: 20px;
    }

    /* GitHub Box */
    .github-box {
      padding: 20px;
      background: var(--github-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-decoration: none;
      color: #fff;
      transition: all 0.3s ease;
    }

    .github-box:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
    }

    .github-info {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.8);
    }

    .btn {
      display: block;
      padding: 18px 20px;
      border-radius: 12px;
      background: var(--accent);
      color: #000;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 700;
      transition: all 0.2s ease;
    }

    .btn:hover {
      background: #f0f0f0;
      transform: scale(1.02);
    }

    .features {
      margin-top: 30px;
      text-align: left;
      display: inline-block;
      width: 100%;
    }

    .feature-item {
      display: flex;
      align-items: center;
      margin: 10px 0;
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.9rem;
    }

    .feature-item svg {
      margin-right: 12px;
      color: #4ade80;
    }

    footer {
      margin-top: 40px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>JGR Cursor</h1>
    <p class="subtitle">Custom Windows cursors, simplified.</p>

    <div class="glass">
      <a href="JGR.Cursor.Installer.exe" download="JGR.Cursor.Installer.exe" class="btn">
        Download for Windows
      </a>

      <div class="features">
        <div class="feature-item">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"></path></svg>
          Direct Executable (.exe)
        </div>
        <div class="feature-item">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"></path></svg>
          No complex setup required
        </div>
      </div>
    </div>

    <a href="https://github.com/infamousjuu-debug/jgr-cursor-installer" target="_blank" class="github-box">

        <span>View Source on GitHub</span>
      </div>
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"></path></svg>
    </a>

    <footer>
      &copy; 2026 JGR SOFTWARE &bull; OPEN SOURCE
    </footer>
  </div>

</body>
</html>
