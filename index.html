<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JGR Cursor Installer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --glass-bg: rgba(255, 255, 255, 0.07);
      --glass-border: rgba(255, 255, 255, 0.15);
      --accent: #ffffff;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI Variable", "Segoe UI", Arial, sans-serif;
      background: #0a0a0a;
      /* Animated mesh background to show off transparency */
      background-image: 
        radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
        radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
        radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
      height: 100vh;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .container {
      text-align: center;
      z-index: 1;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 4rem);
      margin-bottom: 5px;
      font-weight: 700;
      letter-spacing: -1px;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.6);
      font-size: 1.1rem;
      margin-bottom: 40px;
    }

    /* Enhanced Transparency Effect */
    .glass {
      padding: 50px;
      max-width: 450px;
      background: var(--glass-bg);
      backdrop-filter: blur(25px) saturate(180%);
      -webkit-backdrop-filter: blur(25px) saturate(180%);
      border-radius: 24px;
      border: 1px solid var(--glass-border);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      transition: transform 0.3s ease;
    }

    .glass:hover {
      transform: translateY(-5px);
      border: 1px solid rgba(255, 255, 255, 0.25);
    }

    .btn {
      display: block;
      padding: 18px 20px;
      border-radius: 12px;
      background: var(--accent);
      color: #000;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 700;
      transition: all 0.2s ease;
      box-shadow: 0 10px 15px -3px rgba(255, 255, 255, 0.1);
    }

    .btn:hover {
      background: #f0f0f0;
      transform: scale(1.02);
      box-shadow: 0 20px 25px -5px rgba(255, 255, 255, 0.2);
    }

    .features {
      margin-top: 35px;
      text-align: left;
      display: inline-block;
      width: 100%;
    }

    .feature-item {
      display: flex;
      align-items: center;
      margin: 12px 0;
      color: rgba(255, 255, 255, 0.8);
      font-size: 0.95rem;
    }

    .feature-item svg {
      margin-right: 12px;
      color: #4ade80; /* Green checkmark */
    }

    footer {
      position: fixed;
      bottom: 30px;
      width: 100%;
      text-align: center;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>JGR Cursor</h1>
    <p class="subtitle">Elevate your Windows cursor experience.</p>

    <div class="glass">
      <a href="JGR-Cursor-Installer.exe" download class="btn">
        Download for Windows
      </a>

      <div class="features">
        <div class="feature-item">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"></path></svg>
          One-click installation
        </div>
        <div class="feature-item">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"></path></svg>
          Optimized for Windows 11
        </div>
        <div class="feature-item">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"></path></svg>
          High-DPI support
        </div>
        <div class="feature-item">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"></path></svg>
          Lightweight (under 2MB)
        </div>
      </div>
    </div>

    <footer>
      &copy; 2026 JGR SOFTWARE &bull; BUILT FOR SPEED
    </footer>
  </div>

</body>
</html>
