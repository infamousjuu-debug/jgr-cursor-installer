<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JGR Cursor Installer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --glass-bg: rgba(255, 255, 255, 0.06);
      --glass-border: rgba(255, 255, 255, 0.12);
      --accent: #ffffff;
      --glow: rgba(255, 255, 255, 0.1);
    }

    body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI Variable Display", "Segoe UI", sans-serif;
      background: #050505;
      /* High-contrast mesh gradient to show off the blur */
      background-image: 
        radial-gradient(at 0% 0%, hsla(250,20%,10%,1) 0, transparent 50%), 
        radial-gradient(at 100% 0%, hsla(340,30%,15%,1) 0, transparent 50%),
        radial-gradient(at 50% 100%, hsla(220,40%,15%,1) 0, transparent 50%);
      min-height: 100vh;
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
    }

    .container {
      text-align: center;
      z-index: 1;
      padding: 40px 20px;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 3.8rem);
      margin: 0;
      font-weight: 700;
      letter-spacing: -2px;
      background: linear-gradient(to bottom, #fff 60%, #888);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.5);
      font-size: 1.1rem;
      margin-bottom: 40px;
      font-weight: 400;
    }

    /* Ultra-Transparent Card */
    .glass {
      position: relative;
      padding: 40px;
      background: var(--glass-bg);
      backdrop-filter: blur(30px) saturate(200%);
      -webkit-backdrop-filter: blur(30px) saturate(200%);
      border-radius: 28px;
      border: 1px solid var(--glass-border);
      box-shadow: 0 30px 60px rgba(0,0,0,0.6);
      margin-bottom: 24px;
      overflow: hidden;
    }

    /* Subtle top light effect */
    .glass::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    }

    .btn {
      display: block;
      padding: 20px;
      border-radius: 14px;
      background: var(--accent);
      color: #000;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 700;
      transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
      position: relative;
      overflow: hidden;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(255, 255, 255, 0.2);
    }

    .btn:active {
      transform: translateY(0);
    }

    /* Shimmer animation on button */
    .btn::after {
      content: "";
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
