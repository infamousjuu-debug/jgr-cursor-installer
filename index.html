<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JGR Cursor Installer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Reset & Base */
    body {
      margin: 0;
      padding: 0;
      background-color: #000;
      color: #fff;
      font-family: "Segoe UI Variable", "Segoe UI", sans-serif;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* Wave Background Animation */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: linear-gradient(180deg, #000 0%, #111 100%);
    }

    .waves {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 40vh;
      min-height: 200px;
    }

    .parallax > use {
      animation: move-forever 25s cubic-bezier(.55,.5,.45,.5) infinite;
    }
    .parallax > use:nth-child(1) { animation-delay: -2s; animation-duration: 7s; }
    .parallax > use:nth-child(2) { animation-delay: -3s; animation-duration: 10s; }
    .parallax > use:nth-child(3) { animation-delay: -4s; animation-duration: 13s; }
    .parallax > use:nth-child(4) { animation-delay: -5s; animation-duration: 20s; }

    @keyframes move-forever {
      0% { transform: translate3d(-90px, 0, 0); }
      100% { transform: translate3d(85px, 0, 0); }
    }

    /* Content Container */
    .container {
      text-align: center;
      padding: 20px;
      z-index: 1;
      width: 100%;
      max-width: 450px;
    }

    h1 {
      font-size: 3.5rem;
      font-weight: 800;
      margin: 0;
      letter-spacing: -2px;
      text-transform: uppercase;
    }

    .subtitle {
      color: #888;
      font-size: 1rem;
      margin-bottom: 30px;
      letter-spacing: 1px;
    }

    /* Transparent Glass Card */
    .glass-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      margin-bottom: 20px;
    }

    /* Buttons */
    .btn-main {
      display: block;
      background: #fff;
      color: #000;
      padding: 18px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      font-size: 1.1rem;
      transition: all 0.2s ease;
      margin-bottom: 25px;
    }

    .btn-main:hover {
      transform: scale(1.02);
      background: #e0e0e0;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
    }

    .github-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #aaa;
      text-decoration: none;
      font-size: 0.9rem;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: 0.3s;
    }

    .github-link:hover {
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      border-color: rgba(255, 255, 255, 0.2);
    }

    /* Checklist */
    .features {
      text-align: left;
      margin-top: 20px;
    }

    .feature {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #ccc;
      font-size: 0.9rem;
      margin-bottom: 8px;
    }

    .feature svg {
      color: #fff;
    }

    footer {
      margin-top: 40px;
      font-size: 0.7rem;
      color: #444;
      letter-spacing: 2px;
    }
  </style>
</head>

</body>
